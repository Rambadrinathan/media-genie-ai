name: Daily QC — Media Genie AI

on:
  schedule:
    # 01:30 UTC daily = 07:00 IST
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      ping_on_success:
        description: 'Send Telegram ping even when all checks pass (for manual verification)'
        required: false
        type: boolean
        default: false

jobs:
  qc:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run health checks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PING_ON_SUCCESS: ${{ inputs.ping_on_success }}
        run: |
          set -u
          BASE="https://media-genie-ai.vercel.app"
          FAILURES=()

          check_page() {
            local name="$1"
            local path="$2"
            local expected="${3:-200}"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$BASE$path" || echo "timeout")
            if [[ "$code" != "$expected" ]]; then
              FAILURES+=("$name ($path) → HTTP $code (expected $expected)")
              echo "FAIL: $name ($path) → $code"
            else
              echo "OK:   $name ($path) → $code"
            fi
          }

          check_api_taxonomy() {
            local body
            body=$(curl -s --max-time 15 "$BASE/api/images/taxonomy?approvedOnly=true" || echo "")
            if ! echo "$body" | grep -q '"folders"'; then
              FAILURES+=("Taxonomy API did not return expected JSON — possible Supabase outage")
              echo "FAIL: Taxonomy API — unexpected body: ${body:0:120}"
            else
              echo "OK:   Taxonomy API returned valid JSON"
            fi
          }

          echo "=== Media Genie AI — Daily QC ==="
          echo "Base URL: $BASE"
          echo

          check_page "Home"            "/"
          check_page "Portfolio list"  "/portfolio"
          check_page "Review"          "/review"
          check_page "Settings"        "/settings"
          check_api_taxonomy

          echo

          if [[ ${#FAILURES[@]} -gt 0 ]]; then
            echo "=== ${#FAILURES[@]} failure(s) ==="
            MSG=$(printf '🔴 Media Genie daily QC: %d failure(s)\n\n' "${#FAILURES[@]}")
            for f in "${FAILURES[@]}"; do
              MSG+=$(printf '• %s\n' "$f")
            done
            MSG+=$(printf '\nRun: https://github.com/%s/actions/runs/%s\n' \
              "${{ github.repository }}" "${{ github.run_id }}")

            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg cid "$TELEGRAM_CHAT_ID" --arg msg "$MSG" '{chat_id: $cid, text: $msg}')" \
              > /dev/null
            exit 1
          fi

          echo "=== All checks passed ==="
          if [[ "$PING_ON_SUCCESS" == "true" ]]; then
            MSG="✅ Media Genie daily QC: all 5 checks passed at $(date -u +'%Y-%m-%d %H:%M UTC'). https://media-genie-ai.vercel.app"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -cn --arg cid "$TELEGRAM_CHAT_ID" --arg msg "$MSG" '{chat_id: $cid, text: $msg}')" \
              > /dev/null
          fi
